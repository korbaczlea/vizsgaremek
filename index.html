<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>MandalArt</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="hero">
        <img src="logo_mandalart (2).png" alt="MandalArt logo" class="logo">
        <h1>MANDALART</h1>
        <p class="tagline">CREATE · DECORATE · INSPIRE</p>
    </header>

    <nav class="menu">
        <div class="menu-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Gallery</a>
            <a href="#">Contact</a>
            <a href="#">Prices</a>
            <a href="#">Workshop booking</a>
        </div>
    </nav>


    <div class="auth-links">
        <button class="auth-link" id="loginText" aria-label="Login">Login</button>
        <span class="auth-divider">/</span>
        <button class="auth-link" id="registerText" aria-label="Register">Register</button>
        <button class="auth-link" id="logoutText" aria-label="Logout" style="display: none;">Logout</button>
    </div>


    <div id="loginModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit" class="login-btn">Login</button>
                <p id="loginError" class="error-message"></p>
            </form>
        </div>
    </div>


    <div id="registerModal" class="modal">
        <div class="modal-content">
            <span class="close register-close">&times;</span>
            <h2>Register</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="registerName">Name:</label>
                    <input type="text" id="registerName" name="name" required>
                </div>
                <div class="form-group">
                    <label for="registerEmail">Email:</label>
                    <input type="email" id="registerEmail" name="email" required>
                </div>
                <div class="form-group">
                    <label for="registerPassword">Password:</label>
                    <input type="password" id="registerPassword" name="password" required>
                </div>
                <div class="form-group">
                    <label for="registerConfirmPassword">Confirm Password:</label>
                    <input type="password" id="registerConfirmPassword" name="confirmPassword" required>
                </div>
                <button type="submit" class="login-btn">Create account</button>
                <p id="registerError" class="error-message"></p>
            </form>
        </div>
    </div>

    <main class="gallery">
        <img src="images/mandala1.jpg">
        <img src="images/mandala2.jpg">
        <img src="images/mandala3.jpg">
        <img src="images/mandala4.jpg">
    </main>

    <script src="js.js"></script>
    <script type="module" src="/src/main.jsx"></script>
</body>

</html>
<script type="module" src="/src/main.jsx"></script>
