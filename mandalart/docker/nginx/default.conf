server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # PNG bytes, .ico name (browser default request). Do not use try_files with "/favicon.ico" — nginx may treat it as FS-absolute /favicon.ico → 404.
    # `types {}` prevents mime.types from mapping *.ico → image/vnd.microsoft.icon for this response.
    location = /favicon.ico {
        alias /usr/share/nginx/html/favicon.ico;
        types {}
        default_type image/png;
        access_log off;
    }

    location /api/ {
        proxy_pass http://backend:80/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
