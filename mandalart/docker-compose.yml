services:
  db:
    image: mysql:8.0
    container_name: mandalart-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mandalart
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - "./mandalart.sql:/docker-entrypoint-initdb.d/init.sql:ro"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: mandalart-backend
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: root
      DB_NAME: mandalart
      JWT_SECRET: zH5vR9qX2mN8kT4yP1wL7bJ3sF0gC6eD
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      MANDALART_PUBLIC_ORIGIN: ${MANDALART_PUBLIC_ORIGIN:-https://mandalart.shop}
      MANDALART_MAIL_FROM: ${MANDALART_MAIL_FROM:-noreply@mandalart.shop}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Same path PHP uses (backend/controllers/../../public/gallery_images).
      # Must match nginx html/gallery_images so uploaded files are served publicly.
      - gallery_uploads:/var/www/html/public/gallery_images

  web:
    build:
      context: .
    container_name: mandalart-web
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - gallery_uploads:/usr/share/nginx/html/gallery_images

  adminer:
      image: adminer
      restart: always
      ports:  
      - "8888:8080"

volumes:
  db_data:
  gallery_uploads:
