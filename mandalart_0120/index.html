<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <title>MandalArt</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="hero">
        <img src="logo_mandalart (2).png" alt="MandalArt logo" class="logo">
        <h1>MANDALART</h1>
        <p class="tagline">CREATE · DECORATE · INSPIRE</p>

        <!-- Jobb felső sarok: login/register és cart -->
        <div class="header-actions">
            <div class="auth">
                <a href="#" id="loginBtn">Login</a> / <a href="#" id="registerBtn">Register</a>
            </div>
            <div class="cart" onclick="addToCart()">
                🛒 <span class="cart-count">0</span>
            </div>
        </div>
    </header>

    <nav class="menu">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
        <a href="#">Prices</a>
        <a href="#">Workshop booking</a>
    </nav>

    <main class="gallery">
        <img src="images/mandala1.jpg">
        <img src="images/mandala2.jpg">
        <img src="images/mandala3.jpg">
        <img src="images/mandala4.jpg">
    </main>

    <!-- Modal Overlay -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>

            <!-- Login Form -->
            <form id="loginForm">
                <h2>Login</h2>
                <input type="text" id="loginUsername" placeholder="Username" required>
                <input type="password" id="loginPassword" placeholder="Password" required>
                <button type="submit">Login</button>
                <p>Don't have an account? <a href="#" id="switchToRegister">Register</a></p>
            </form>

            <!-- Register Form -->
            <form id="registerForm" style="display:none;">
                <h2>Register</h2>
                <input type="text" id="registerUsername" placeholder="Username" required>
                <input type="password" id="registerPassword" placeholder="Password" required>
                <input type="password" id="registerPassword2" placeholder="Confirm Password" required>
                <button type="submit">Register</button>
                <p>Already have an account? <a href="#" id="switchToLogin">Login</a></p>
            </form>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
